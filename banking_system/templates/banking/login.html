{% extends 'banking/base.html' %}
{% block title %}Login — NexaBank{% endblock %}
{% block content %}
<style>
.auth-wrap {
    max-width: 440px;
    margin: 3rem auto;
}
.auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.auth-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,77,255,0.15));
    border: 1px solid rgba(0,229,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin: 0 auto 1rem;
}
.auth-header h1 { font-size: 1.6rem; font-weight: 800; }
.auth-header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.4rem; }
.auth-footer { text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: 0.875rem; }
.auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }
.btn-block { width: 100%; justify-content: center; padding: 13px; font-size: 0.95rem; }
</style>
<div class="auth-wrap fade-up">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Welcome back</h1>
            <p>Sign in to your NexaBank account</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="your_username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In →</button>
        </form>
    </div>
    <div class="auth-footer">
        Don't have an account? <a href="{% url 'register' %}">Create one free</a>
    </div>
</div>
{% endblock %}
