{% extends 'banking/base.html' %}
{% block title %}Withdraw — NexaBank{% endblock %}
{% block content %}
<style>
.form-page-wrap { max-width: 520px; margin: 2rem auto; }
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.25rem; }
.form-page-header { margin-bottom: 1.75rem; }
.form-page-icon { width: 50px; height: 50px; border-radius: 14px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.35rem; margin-bottom: 1rem; }
.form-page-header h1 { font-size: 1.5rem; font-weight: 800; }
.form-page-header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.3rem; }
.btn-block { width: 100%; justify-content: center; padding: 13px; font-size: 0.95rem; }
.btn-back { color: var(--muted); text-decoration: none; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.25rem; transition: color 0.2s; }
.btn-back:hover { color: var(--text); }
</style>
<div class="form-page-wrap fade-up">
    <a href="{% url 'dashboard' %}" class="btn-back">← Back to Dashboard</a>
    <div class="form-card">
        <div class="form-page-header">
            <div class="form-page-icon">⬆</div>
            <h1>Withdraw Funds</h1>
            <p>Withdraw cash from your account</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Select Account</label>
                <select name="account" class="form-control" required>
                    <option value="">Choose an account...</option>
                    {% for account in form.account.field.queryset %}
                    <option value="{{ account.id }}">{{ account.get_account_type_display }} — {{ account.account_number }} (${{ account.balance|floatformat:2 }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Amount (USD)</label>
                <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
                <label class="form-label">Description (Optional)</label>
                <input type="text" name="description" class="form-control" placeholder="e.g. ATM withdrawal...">
            </div>
            <button type="submit" class="btn btn-danger btn-block">Confirm Withdrawal</button>
        </form>
    </div>
</div>
{% endblock %}
