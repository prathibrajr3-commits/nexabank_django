<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deposit — NexaBank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#f0faf5;--white:#ffffff;--green:#0f9e6a;--green2:#0d8a5c;--mint:#c8f0e0;--border:#d4ead9;--text:#0d2b1f;--muted:#5a8a72;--accent:#00c27a;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
/* BG BLOBS */
body::before{content:'';position:fixed;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,194,122,.12),transparent 70%);pointer-events:none;}
body::after{content:'';position:fixed;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(15,158,106,.08),transparent 70%);pointer-events:none;}
/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2rem;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.brand{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:800;color:var(--green);text-decoration:none;letter-spacing:-.3px;}
.nav-links{display:flex;gap:.25rem;}
.nav-link{padding:.45rem .875rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:.825rem;font-weight:500;transition:all .2s;}
.nav-link:hover{background:var(--mint);color:var(--green);}
.nav-link.active{background:var(--mint);color:var(--green);font-weight:600;}
.nav-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:.45rem .875rem;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.825rem;cursor:pointer;transition:all .2s;}
.nav-logout:hover{border-color:var(--green);color:var(--green);}
/* PAGE */
.page{max-width:520px;margin:3rem auto;padding:0 1.5rem;}
/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:.5rem;margin-bottom:1.75rem;font-size:.8rem;color:var(--muted);}
.breadcrumb a{color:var(--green);text-decoration:none;font-weight:500;}
.breadcrumb a:hover{text-decoration:underline;}
.breadcrumb .sep{opacity:.4;}
/* CARD */
.deposit-card{background:var(--white);border-radius:24px;padding:2.5rem;border:1px solid var(--border);box-shadow:0 4px 40px rgba(15,158,106,.06);}
.card-icon{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1.25rem;box-shadow:0 8px 24px rgba(0,194,122,.25);}
.card-title{font-size:1.6rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.3rem;}
.card-sub{color:var(--muted);font-size:.875rem;margin-bottom:2rem;}
/* FORM */
.form-group{margin-bottom:1.25rem;}
label{display:block;font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
select,input{width:100%;padding:.875rem 1rem;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;outline:none;transition:all .25s;}
select:focus,input:focus{border-color:var(--accent);background:var(--white);box-shadow:0 0 0 3px rgba(0,194,122,.1);}
select option{background:var(--white);}
input::placeholder{color:rgba(90,138,114,.4);}
.amount-wrap{position:relative;}
.amount-prefix{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:1rem;font-weight:600;color:var(--muted);}
.amount-input{padding-left:1.75rem!important;font-size:1.2rem!important;font-family:'Fira Code',monospace!important;font-weight:500!important;}
/* QUICK AMOUNTS */
.quick-amounts{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;}
.qa{padding:.4rem .875rem;border:1.5px solid var(--border);border-radius:20px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;background:none;}
.qa:hover{border-color:var(--accent);color:var(--green);background:var(--mint);}
/* SUMMARY BOX */
.summary{background:var(--mint);border-radius:14px;padding:1rem 1.25rem;margin:1.5rem 0;border:1px solid rgba(0,194,122,.2);}
.summary-row{display:flex;justify-content:space-between;align-items:center;font-size:.825rem;}
.summary-row:not(:last-child){margin-bottom:.5rem;}
.summary-label{color:var(--muted);font-weight:500;}
.summary-value{font-family:'Fira Code',monospace;font-weight:600;color:var(--text);}
.summary-value.big{font-size:1.1rem;color:var(--green);}
/* SUBMIT */
.submit-btn{width:100%;padding:1rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--green2));color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:-.2px;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,194,122,.3);}
/* FLASH */
.flash{padding:.875rem 1.1rem;border-radius:12px;margin-bottom:1.25rem;font-size:.825rem;font-weight:500;display:flex;align-items:center;gap:.625rem;}
.flash-success{background:rgba(0,194,122,.1);color:var(--green);border:1px solid rgba(0,194,122,.25);}
.flash-error{background:rgba(220,50,50,.06);color:#c03030;border:1px solid rgba(220,50,50,.2);}
@media(max-width:600px){nav .nav-links{display:none;}}
</style>
</head>
<body>
<nav>
  <a class="brand" href="{% url 'dashboard' %}">NexaBank</a>
  <div class="nav-links">
    <a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a>
    <a href="{% url 'deposit' %}" class="nav-link active">Deposit</a>
    <a href="{% url 'withdraw' %}" class="nav-link">Withdraw</a>
    <a href="{% url 'transfer' %}" class="nav-link">Transfer</a>
    <a href="{% url 'transactions' %}" class="nav-link">History</a>
    <a href="{% url 'loans' %}" class="nav-link">Loans</a>
  </div>
  <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="nav-logout">Logout</button></form>
</nav>
<div class="page">
  <div class="breadcrumb">
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <span class="sep">›</span>
    <span>Deposit</span>
  </div>
  {% if messages %}{% for m in messages %}<div class="flash flash-{{ m.tags }}">{{ m }}</div>{% endfor %}{% endif %}
  <div class="deposit-card">
    <div class="card-icon">⬇</div>
    <h1 class="card-title">Deposit Funds</h1>
    <p class="card-sub">Add money to your account instantly</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Select Account</label>
        <select name="account" required>
          <option value="">Choose an account...</option>
          {% for acc in form.account.field.queryset %}
          <option value="{{ acc.pk }}">{{ acc.get_account_type_display }} — {{ acc.account_number }} (${{ acc.balance|floatformat:2 }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Amount</label>
        <div class="amount-wrap">
          <span class="amount-prefix">$</span>
          <input type="number" name="amount" id="amtInput" class="amount-input" placeholder="0.00" step="0.01" min="0.01" required>
        </div>
        <div class="quick-amounts">
          <button type="button" class="qa" onclick="setAmt(100)">$100</button>
          <button type="button" class="qa" onclick="setAmt(250)">$250</button>
          <button type="button" class="qa" onclick="setAmt(500)">$500</button>
          <button type="button" class="qa" onclick="setAmt(1000)">$1,000</button>
          <button type="button" class="qa" onclick="setAmt(5000)">$5,000</button>
        </div>
      </div>
      <div class="form-group">
        <label>Description (Optional)</label>
        <input type="text" name="description" placeholder="e.g. Salary, cash deposit...">
      </div>
      <div class="summary" id="summary" style="display:none;">
        <div class="summary-row"><span class="summary-label">Deposit Amount</span><span class="summary-value big" id="sumAmt">$0.00</span></div>
        <div class="summary-row"><span class="summary-label">Processing Fee</span><span class="summary-value">$0.00</span></div>
        <div class="summary-row"><span class="summary-label">You Receive</span><span class="summary-value" id="sumNet">$0.00</span></div>
      </div>
      <button type="submit" class="submit-btn">Confirm Deposit ✓</button>
    </form>
  </div>
</div>
<script>
function setAmt(v){const i=document.getElementById('amtInput');i.value=v;i.dispatchEvent(new Event('input'));}
document.getElementById('amtInput').addEventListener('input',function(){
  const v=parseFloat(this.value)||0;
  const s=document.getElementById('summary');
  if(v>0){
    s.style.display='block';
    document.getElementById('sumAmt').textContent='$'+v.toLocaleString('en-US',{minimumFractionDigits:2});
    document.getElementById('sumNet').textContent='$'+v.toLocaleString('en-US',{minimumFractionDigits:2});
  }else{s.style.display='none';}
});
</script>
</body>
</html>
